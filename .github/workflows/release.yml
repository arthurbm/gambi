name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Capture release ref
        id: ref
        run: echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: version
        run: |
          VERSION=$(node <<'NODE'
          const fs = require("node:fs");

          const files = [
            "apps/docs/package.json",
            "apps/tui/package.json",
            "packages/cli/package.json",
            "packages/config/package.json",
            "packages/core/package.json",
            "packages/sdk/package.json",
          ];

          function compareSemver(left, right) {
            const leftParts = left.split(".").map(Number);
            const rightParts = right.split(".").map(Number);

            for (let index = 0; index < Math.max(leftParts.length, rightParts.length); index++) {
              const leftPart = leftParts[index] ?? 0;
              const rightPart = rightParts[index] ?? 0;

              if (leftPart !== rightPart) {
                return leftPart - rightPart;
              }
            }

            return 0;
          }

          function bumpVersion(version, bump) {
            const [major, minor, patch] = version.split(".").map(Number);

            if (bump === "major") {
              return `${major + 1}.0.0`;
            }

            if (bump === "minor") {
              return `${major}.${minor + 1}.0`;
            }

            return `${major}.${minor}.${patch + 1}`;
          }

          const versions = files.map((file) => {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            return pkg.version;
          });

          versions.sort(compareSemver);
          process.stdout.write(bumpVersion(versions.at(-1), process.env.RELEASE_BUMP));
          NODE
          )

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"
        env:
          RELEASE_BUMP: ${{ inputs.bump }}

  build-cli:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI distribution
        run: GAMBI_RELEASE_VERSION=${{ needs.version.outputs.version }} bun run --cwd packages/cli build

      - name: Summarize build outputs
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(
            fs.readFileSync("packages/cli/dist/manifest.json", "utf8")
          );

          console.log("CLI distribution manifest:");
          console.log(`  version: ${manifest.version}`);
          console.log(`  wrapper: ${manifest.wrapperPackageDir}`);
          console.log("  binary packages:");
          for (const pkg of manifest.binaryPackages) {
            console.log(
              `    - ${pkg.packageName} (${pkg.assetName}) ${pkg.sizeBytes} bytes sha256:${(pkg.sha256 || "").slice(0, 12)}...`
            );
          }
          console.log("  release assets:");
          for (const asset of manifest.releaseAssets || []) {
            console.log(
              `    - ${asset.assetName} (${asset.releaseAssetPath}) ${asset.sizeBytes} bytes sha256:${(asset.sha256 || "").slice(0, 12)}...`
            );
          }

          const lines = [
            "## CLI build output",
            "",
            `Version: \`${manifest.version}\``,
            "",
            "### Binary packages",
            "",
            "| Package | Asset | Size (bytes) | SHA256 |",
            "|---|---|---:|---|",
            ...manifest.binaryPackages.map(
              (pkg) =>
                `| \`${pkg.packageName}\` | \`${pkg.assetName}\` | ${pkg.sizeBytes ?? "n/a"} | \`${pkg.sha256 || "n/a"}\` |`
            ),
            "",
            "### Release assets",
            "",
            "| Asset | Path | Size (bytes) | SHA256 |",
            "|---|---|---:|---|",
            ...(manifest.releaseAssets || []).map(
              (asset) =>
                `| \`${asset.assetName}\` | \`${asset.releaseAssetPath}\` | ${asset.sizeBytes ?? "n/a"} | \`${asset.sha256 || "n/a"}\` |`
            ),
          ];
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `${lines.join("\n")}\n`
          );
          NODE

      - name: Upload CLI distribution
        uses: actions/upload-artifact@v7
        with:
          name: gambi-cli-dist
          path: packages/cli/dist

  publish:
    needs: [version, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download CLI distribution
        uses: actions/download-artifact@v8
        with:
          name: gambi-cli-dist
          path: packages/cli/dist

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish packages
        run: bun run scripts/publish.ts ${{ needs.version.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summarize publish verification
        if: always()
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const reportPath = "packages/cli/dist/release-report.json";
          if (!fs.existsSync(reportPath)) {
            console.log("No release report found — skipping summary.");
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const verification = report.npmVerification || [];
          const lines = [
            "## npm publish verification",
            "",
            `Version: \`${report.version}\``,
            `Tag: \`${report.npmTag}\``,
            `Status: \`${report.status || "unknown"}\``,
            "",
            "| Package | Published Version | Dist-tag Version | Verified |",
            "|---|---|---|---|",
            ...verification.map(
              (result) =>
                `| \`${result.packageName}\` | \`${result.publishedVersion}\` | \`${result.distTagVersion}\` | ${result.verified ? "✅" : "❌"} |`
            ),
          ];
          if (report.error) {
            lines.push("", `**Error:** ${report.error}`);
          }
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `${lines.join("\n")}\n`
          );
          NODE

      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gambi-release-report
          path: packages/cli/dist/release-report.json
          if-no-files-found: warn

      - name: Commit and tag
        run: |
          git add .
          git commit -m "release: v${{ needs.version.outputs.version }}"
          git tag v${{ needs.version.outputs.version }}
          git push origin HEAD:main --tags

  github-release:
    needs: [version, build-cli, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.ref }}

      - name: Download CLI distribution
        uses: actions/download-artifact@v8
        with:
          name: gambi-cli-dist
          path: packages/cli/dist

      - name: Verify release assets before upload
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const manifest = JSON.parse(
            fs.readFileSync("packages/cli/dist/manifest.json", "utf8")
          );
          const expectedAssets = manifest.releaseAssets || [];

          for (const asset of expectedAssets) {
            const releaseAssetPath = asset.releaseAssetPath;
            const resolvedPath = path.isAbsolute(releaseAssetPath)
              ? releaseAssetPath
              : path.join("packages", "cli", releaseAssetPath);
            if (!fs.existsSync(resolvedPath)) {
              throw new Error(`Missing release asset: ${resolvedPath}`);
            }
            if (asset.sizeBytes) {
              const stat = fs.statSync(resolvedPath);
              if (stat.size !== asset.sizeBytes) {
                throw new Error(
                  `Size mismatch for ${resolvedPath}: expected ${asset.sizeBytes}, got ${stat.size}`
                );
              }
            }
          }

          console.log(
            `Verified ${expectedAssets.length} release assets exist before GitHub upload.`
          );
          NODE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: |
            packages/cli/dist/releases/gambi-linux-x64
            packages/cli/dist/releases/gambi-linux-arm64
            packages/cli/dist/releases/gambi-darwin-arm64
            packages/cli/dist/releases/gambi-darwin-x64
            packages/cli/dist/releases/gambi-windows-x64.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const { execSync } = require("node:child_process");

          const version = process.env.RELEASE_VERSION;
          const tag = `v${version}`;
          const manifest = JSON.parse(
            fs.readFileSync("packages/cli/dist/manifest.json", "utf8")
          );
          const expectedAssets = manifest.releaseAssets || [];

          const release = JSON.parse(
            execSync(`gh release view ${tag} --json assets`, {
              encoding: "utf8",
              stdio: ["ignore", "pipe", "pipe"],
            })
          );

          const actualAssets = release.assets || [];
          const missing = [];
          const mismatchedSizes = [];

          for (const expected of expectedAssets) {
            const actual = actualAssets.find(
              (asset) => asset.name === expected.assetName
            );
            if (!actual) {
              missing.push(expected.assetName);
              continue;
            }
            if (Number(actual.size) !== Number(expected.sizeBytes)) {
              mismatchedSizes.push({
                asset: expected.assetName,
                expected: expected.sizeBytes,
                actual: Number(actual.size),
              });
            }
          }

          if (missing.length > 0 || mismatchedSizes.length > 0) {
            throw new Error(
              `GitHub Release asset verification failed. missing=${JSON.stringify(
                missing
              )} sizeMismatch=${JSON.stringify(mismatchedSizes)}`
            );
          }

          const lines = [
            "## GitHub Release asset verification",
            "",
            `Tag: \`${tag}\``,
            "",
            "| Asset | Expected Size (bytes) | Uploaded Size (bytes) |",
            "|---|---:|---:|",
            ...expectedAssets.map((expected) => {
              const actual = actualAssets.find(
                (asset) => asset.name === expected.assetName
              );
              return `| \`${expected.assetName}\` | ${expected.sizeBytes} | ${actual?.size ?? "n/a"} |`;
            }),
          ];
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `${lines.join("\n")}\n`
          );

          console.log(
            `Verified ${expectedAssets.length} GitHub Release assets for ${tag}.`
          );
          NODE
