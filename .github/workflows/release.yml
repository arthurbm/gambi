name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Capture release ref
        id: ref
        run: echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: version
        run: |
          VERSION=$(node <<'NODE'
          const fs = require("node:fs");

          const files = [
            "apps/docs/package.json",
            "packages/cli/package.json",
            "packages/config/package.json",
            "packages/core/package.json",
            "packages/sdk/package.json",
          ];

          function compareSemver(left, right) {
            const leftParts = left.split(".").map(Number);
            const rightParts = right.split(".").map(Number);

            for (let index = 0; index < Math.max(leftParts.length, rightParts.length); index++) {
              const leftPart = leftParts[index] ?? 0;
              const rightPart = rightParts[index] ?? 0;

              if (leftPart !== rightPart) {
                return leftPart - rightPart;
              }
            }

            return 0;
          }

          function bumpVersion(version, bump) {
            const [major, minor, patch] = version.split(".").map(Number);

            if (bump === "major") {
              return `${major + 1}.0.0`;
            }

            if (bump === "minor") {
              return `${major}.${minor + 1}.0`;
            }

            return `${major}.${minor}.${patch + 1}`;
          }

          const versions = files.map((file) => {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            return pkg.version;
          });

          versions.sort(compareSemver);
          process.stdout.write(bumpVersion(versions.at(-1), process.env.RELEASE_BUMP));
          NODE
          )

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"
        env:
          RELEASE_BUMP: ${{ inputs.bump }}

  build-cli:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI distribution
        run: GAMBI_RELEASE_VERSION=${{ needs.version.outputs.version }} bun run --cwd packages/cli build

      - name: Upload CLI distribution
        uses: actions/upload-artifact@v4
        with:
          name: gambi-cli-dist
          path: packages/cli/dist

  publish:
    needs: [version, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Remove auth token for OIDC publishing
        run: sed -i '/_authToken/d' "$HOME/.npmrc"

      - name: Download CLI distribution
        uses: actions/download-artifact@v4
        with:
          name: gambi-cli-dist
          path: packages/cli/dist

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish packages
        run: bun run scripts/publish.ts ${{ needs.version.outputs.version }}

      - name: Commit and tag
        run: |
          git add .
          git commit -m "release: v${{ needs.version.outputs.version }}"
          git tag v${{ needs.version.outputs.version }}
          git push origin HEAD:main --tags

  github-release:
    needs: [version, build-cli, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Download CLI distribution
        uses: actions/download-artifact@v4
        with:
          name: gambi-cli-dist
          path: packages/cli/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: |
            packages/cli/dist/releases/gambi-linux-x64
            packages/cli/dist/releases/gambi-linux-arm64
            packages/cli/dist/releases/gambi-darwin-arm64
            packages/cli/dist/releases/gambi-darwin-x64
            packages/cli/dist/releases/gambi-windows-x64.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
