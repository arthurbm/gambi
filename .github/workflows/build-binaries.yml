name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g., v0.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build distribution
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          GAMBI_RELEASE_VERSION="$VERSION" bun run --cwd packages/cli build

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ inputs.tag }} packages/cli/dist/releases/* --clobber
